services:
  flowback-frontend:
    image: kattenelvis1/flowback-frontend:latest
    environment:
      PUBLIC_API_URL: http://localhost:8085/api
      PUBLIC_WEBSOCKET_API: ws://localhost:8085/api
      PUBLIC_POLL_VERSION: 2
    depends_on:
      - flowback-backend
    deploy:
      replicas: 1
    expose:
      - 3000

  flowback-backend:
    image: kattenelvis1/flowback-backend:latest
    command: bash -c "python manage.py migrate && python manage.py runserver
      0.0.0.0:8000"
    restart: unless-stopped
    expose:
      - 8000
    depends_on:
      flowback-postgresql:
        condition: service_healthy
    environment:
      FLOWBACK_PSQL_NAME: ${POSTGRES_DB:-flowback}
      FLOWBACK_PSQL_USER: ${POSTGRES_USER:-flowback}
      FLOWBACK_PSQL_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      FLOWBACK_PSQL_HOST: ${POSTGRES_HOST:-flowback-postgresql}
      FLOWBACK_PSQL_PORT: ${POSTGRES_PORT:-5432}
      FLOWBACK_REDIS_HOST: ${REDIS_HOST:-flowback-redis}
      URL_SUBPATH: api
      FLOWBACK_POLL_VERSION_LOCK: 2
    deploy:
      replicas: 1

  flowback-postgresql:
    image: postgres:16.2
    restart: unless-stopped
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      POSTGRES_DB: ${POSTGRES_DB:-flowback}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowback}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # expose:
    #   - 5432
    #    ports:
    #      - "5432:5432"

  flowback-redis:
    image: redis:5
    restart: unless-stopped
    # expose:
    #   - "6379:6379"
    #    ports:
    #      - "6379:6379"

  flowback-celery-worker:
    restart: unless-stopped
    image: kattenelvis1/flowback-backend:latest
    command: celery -A backend worker --loglevel=info
    depends_on:
      - flowback-redis
    environment:
      FLOWBACK_PSQL_NAME: ${POSTGRES_DB:-flowback}
      FLOWBACK_PSQL_USER: ${POSTGRES_USER:-flowback}
      FLOWBACK_PSQL_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      FLOWBACK_PSQL_HOST: ${POSTGRES_HOST:-flowback-postgresql}
      FLOWBACK_PSQL_PORT: ${POSTGRES_PORT:-5432}
      FLOWBACK_REDIS_HOST: ${REDIS_HOST:-flowback-redis}

  flowback-celery-beat:
    image: kattenelvis1/flowback-backend:latest
    restart: unless-stopped
    command: celery -A backend beat --loglevel=info
    depends_on:
      - flowback-redis
    environment:
      FLOWBACK_PSQL_NAME: ${POSTGRES_DB:-flowback}
      FLOWBACK_PSQL_USER: ${POSTGRES_USER:-flowback}
      FLOWBACK_PSQL_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      FLOWBACK_PSQL_HOST: ${POSTGRES_HOST:-flowback-postgresql}
      FLOWBACK_PSQL_PORT: ${POSTGRES_PORT:-5432}
      FLOWBACK_REDIS_HOST: ${REDIS_HOST:-flowback-redis}

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - flowback-frontend
      - flowback-backend

volumes:
  caddy_data:
  postgres_data:
    driver: local
