services:
  flowback-frontend:
    image: kattenelvis1/flowback-frontend:latest
    depends_on:
      - flowback-backend
    deploy:
      replicas: 4
    expose:
      - 4000

  flowback-backend:
    image: kattenelvis1/flowback-backend:latest
    restart: unless-stopped
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt && python
      manage.py migrate && python manage.py runserver 0.0.0.0:${PORT:-8000}"
    ports:
      - ${PORT:-8000}:${PORT:-8000}
    volumes:
      - .:/app
    depends_on:
      flowback-postgresql:
        condition: service_healthy
    environment:
      FLOWBACK_PSQL_NAME: ${POSTGRES_DB:-flowback}
      FLOWBACK_PSQL_USER: ${POSTGRES_USER:-flowback}
      FLOWBACK_PSQL_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      FLOWBACK_PSQL_HOST: ${POSTGRES_HOST:-flowback-postgresql}
      FLOWBACK_PSQL_PORT: ${POSTGRES_PORT:-5432}
      FLOWBACK_REDIS_HOST: ${REDIS_HOST:-flowback-redis}
    deploy:
      replicas: 4

  flowback-postgresql:
    image: postgres:16.2
    restart: unless-stopped
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      POSTGRES_DB: ${POSTGRES_DB:-flowback}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  #    ports:
  #      - "5432:5432"

  flowback-redis:
    image: redis:5
    restart: unless-stopped
  #    ports:
  #      - "6379:6379"

  flowback-celery-worker:
    restart: unless-stopped
    image: kattenelvis1/flowback-backend:latest
    depends_on:
      - flowback-redis
    volumes:
      - .:/app # For persisting periodic task metadata
    environment:
      FLOWBACK_PSQL_NAME: ${POSTGRES_DB:-flowback}
      FLOWBACK_PSQL_USER: ${POSTGRES_USER:-flowback}
      FLOWBACK_PSQL_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      FLOWBACK_PSQL_HOST: ${POSTGRES_HOST:-flowback-postgresql}
      FLOWBACK_PSQL_PORT: ${POSTGRES_PORT:-5432}
      FLOWBACK_REDIS_HOST: ${REDIS_HOST:-flowback-redis}

  flowback-celery-beat:
    image: kattenelvis1/flowback-backend:latest
    restart: unless-stopped
    depends_on:
      - flowback-redis
    volumes:
      - .:/app # For persisting periodic task metadata
    environment:
      FLOWBACK_PSQL_NAME: ${POSTGRES_DB:-flowback}
      FLOWBACK_PSQL_USER: ${POSTGRES_USER:-flowback}
      FLOWBACK_PSQL_PASSWORD: ${POSTGRES_PASSWORD:-flowback}
      FLOWBACK_PSQL_HOST: ${POSTGRES_HOST:-flowback-postgresql}
      FLOWBACK_PSQL_PORT: ${POSTGRES_PORT:-5432}
      FLOWBACK_REDIS_HOST: ${REDIS_HOST:-flowback-redis}

  caddy:
    image: caddy:2-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - web
    depends_on:
      - flowback-frontend

networks:
  web:

volumes:
  caddy_data:
  postgres_data:
    driver: local
